<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="22" fill="#0F1117"/>
 
  <!-- Mic body -->
  <rect x="51" y="20" width="26" height="46" rx="13" fill="#E8A838"/>
  <!-- Mic grille lines -->
  <line x1="51" y1="38" x2="77" y2="38" stroke="#0F1117" stroke-width="1.4" stroke-opacity="0.25"/>
  <line x1="51" y1="44" x2="77" y2="44" stroke="#0F1117" stroke-width="1.4" stroke-opacity="0.25"/>
  <line x1="51" y1="50" x2="77" y2="50" stroke="#0F1117" stroke-width="1.4" stroke-opacity="0.25"/>
 
  <!-- Mic stand arc -->
  <path d="M43 57 Q43 84 64 84 Q85 84 85 57" fill="none" stroke="#E8A838" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Stem -->
