  <line x1="91" y1="58" x2="118" y2="58" stroke="#4EC9B0" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="91" y1="68" x2="107" y2="68" stroke="#4EC9B0" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="91" y1="78" x2="115" y2="78" stroke="#4EC9B0" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
</svg>